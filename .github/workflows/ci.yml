name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: '1'
      CONFIGURATION: Release
      SOLUTION: Allors.Tram.slnx
      TESTS_DIR: artifacts/tests
      NUGET_DIR: artifacts/nuget

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore "$SOLUTION"

      - name: Build
        run: dotnet build "$SOLUTION" --configuration "$CONFIGURATION" --no-restore

      - name: Test - Allors.Tram.Tests
        run: >
          dotnet test Allors.Tram.Tests
          --configuration "$CONFIGURATION"
          --no-build --no-restore
          --logger "trx;LogFileName=Allors.Tram.Tests.trx"
          --results-directory "$TESTS_DIR"

      - name: Pack - Allors.Tram
        run: >
          dotnet pack Allors.Tram
          --configuration "$CONFIGURATION"
          --no-build
          --output "$NUGET_DIR"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/tests/
          if-no-files-found: warn

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget/
          if-no-files-found: error
